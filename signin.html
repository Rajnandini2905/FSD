<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | INDI OTT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --primary-red: #ff4d4d;
            --dark-bg: #080808;
            --card-bg: rgba(22, 22, 22, 0.95);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        @import url("https://fonts.googleapis.com/css?family=Work+Sans:300,400,700|Anton");

        /* Tag Selector */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1500');
            background-size: cover;
            background-position: center;
            font-family: 'Work Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* ID Selector */
        #login-card {
            background: var(--card-bg);
            padding: 50px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        h2 { 
            font-family: 'Anton', sans-serif; 
            font-size: 35px; 
            letter-spacing: 1px; 
            margin-bottom: 30px;
            color: var(--primary-red);
        }

        /* Form Styling */
        .form-control {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: #333;
            border-color: var(--primary-red);
            color: white;
            box-shadow: none;
        }

        /* Class Selector */
        .btn-login {
            background: var(--primary-red);
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #e63e3e;
            transform: scale(1.02);
        }

        /* List Styling */
        .benefits-list {
            list-style: none;
            padding: 0;
            margin: 25px 0;
            font-size: 13px;
            color: var(--text-dim);
        }
        .benefits-list li::before {
            content: "✦ ";
            color: var(--primary-red);
        }

        /* Table Styling */
        .price-table {
            width: 100%;
            font-size: 12px;
            border-top: 1px solid #333;
            margin-top: 20px;
        }
        .price-table td {
            padding: 10px 5px;
            color: var(--text-dim);
        }
        .price-table .tier { color: white; font-weight: bold; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: var(--primary-red); }
    </style>
</head>
<body>

<div id="login-card">
    <h2>Sign In</h2>
    
    <form>
        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password" required>
        </div>
        
        <div class="d-flex justify-content-between mb-4" style="font-size: 12px;">
            <label><input type="checkbox"> Remember me</label>
            <a href="#" style="color: var(--text-dim); text-decoration: none;">Need help?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Sign In</button>
    </form>

    <ul class="benefits-list">
        <li>Watch on TV, Laptop, and Mobile</li>
        <li>Unlimited 4K Movies & Shows</li>
        <li>Cancel your plan anytime</li>
    </ul>

    <table class="price-table">
        <tr>
            <td class="tier">Basic Plan</td>
            <td>1 Screen</td>
            <td>$9.99/mo</td>
        </tr>
        <tr>
            <td class="tier">Premium Plan</td>
            <td>4 Screens</td>
            <td>$19.99/mo</td>
        </tr>
    </table>

    <a href="index.html" class="back-link">New to INDI? <span style="color:white">Back to Home</span></a>
</div>

</body>
</html>
